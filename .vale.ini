# Vale configuration for prose linting
# See https://vale.sh/docs/ for documentation

StylesPath = .styles
Packages = Microsoft, Google, alex
Vocab = Project

# Lint markdown files only
[*.md]
BasedOnStyles = Vale, Google, Microsoft, alex
Google.Headings = NO
Google.Contractions = NO
Google.EmDash = NO
Google.Latin = NO
Google.WordList = NO
