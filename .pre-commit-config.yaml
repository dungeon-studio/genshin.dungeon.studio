# Pre-commit hooks for code quality and consistency
# See https://pre-commit.com for more information

ci:
  # GitHub Actions runs hooks via two separate workflows to avoid duplication:
  # 1. pre-commit.yml (ESLint only) - runs on every PR
  # 2. build.yml (typecheck + build) - runs full build pipeline
  # Skip hooks here that are handled by build.yml to prevent running them twice.
  # Keep this list in sync with what's NOT run in GitHub Actions workflows.
  skip:
    - eslint
    - typescript-check

repos:
  # Basic file checks
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      # File formatting
      - id: trailing-whitespace
        args: [--markdown-linebreak-ext=md]
      - id: end-of-file-fixer
      - id: mixed-line-ending
        args: [--fix=lf]

      # Syntax validation
      - id: check-yaml
        args: [--unsafe] # Allow custom YAML tags
      - id: check-json
        exclude: '\.jsonc$|\.vscode/|tsconfig|\.devcontainer/' # Skip JSONC files and dirs with JSON-with-comments

      # Prevent issues
      - id: check-added-large-files
        args: [--maxkb=1000]
      - id: check-case-conflict
      - id: check-merge-conflict
      - id: check-symlinks
      - id: destroyed-symlinks

      # Git hygiene
      - id: no-commit-to-branch
        args: [--branch, develop, --branch, main]

  # Prettier - Code formatting
  - repo: https://github.com/pre-commit/mirrors-prettier
    rev: v3.1.0
    hooks:
      - id: prettier
        types_or: [javascript, jsx, ts, tsx, json, yaml, markdown, css]
        exclude: 'pnpm-lock\.yaml'
        args: [--write]

  # Markdown linting
  - repo: https://github.com/DavidAnson/markdownlint-cli2
    rev: v0.17.1
    hooks:
      - id: markdownlint-cli2
        args: [--fix]

  # Vale - Prose linting
  - repo: https://github.com/errata-ai/vale
    rev: v3.13.0
    hooks:
      - id: vale
        args: [--config=.vale.ini]
        types: [markdown]
        exclude: |
          (?x)^(
            \.styles/|
            node_modules/|
            \.pnpm-store/|
            dist/|
            build/|
            \.turbo/|
            apps/.*/node_modules/|
            packages/.*/node_modules/|
            pnpm-lock\.yaml
          )

  # Secrets detection
  - repo: https://github.com/Yelp/detect-secrets
    rev: v1.5.0
    hooks:
      - id: detect-secrets
        exclude: pnpm-lock.yaml

  # ESLint - JavaScript/TypeScript linting
  - repo: local
    hooks:
      - id: eslint
        name: eslint
        entry: pnpm exec eslint
        language: system
        types: [javascript, jsx, ts, tsx]
        args: [--fix, --max-warnings=0]

  # TypeScript type checking
  - repo: local
    hooks:
      - id: typescript-check
        name: typescript type check
        entry: pnpm exec turbo run typecheck
        language: system
        types: [ts, tsx]
        pass_filenames: false
        stages: [manual]
