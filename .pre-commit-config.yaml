---
# SPDX-FileCopyrightText: 2026 Alex Brandt <alunduil@gmail.com>
# SPDX-License-Identifier: MIT

# Pre-commit hooks for code quality and consistency
# See https://pre-commit.com for more information

# Global excludes - never touch these directories with any hook
exclude: |
  (?x)^(
    \.styles/(?!config)|    # Vale vendor files (exclude all of .styles/ except .styles/config/)
    node_modules/|          # Dependencies
    \.pnpm-store/|          # pnpm cache
    dist/|                  # Build output
    build/|                 # Build output
    \.turbo/|               # Turborepo cache
    pnpm-lock\.yaml         # Package lockfile
  )

ci:
  # NOTE: This 'skip' list ONLY affects pre-commit.ci (hosted CI service).
  # pre-commit.ci is authoritative for hooks it can run in its environment.
  #
  # GitHub Actions runs hooks via a dedicated local-hooks workflow to avoid
  # duplicating hook execution across systems:
  # 1. pre-commit.yml (hooks that cannot run in pre-commit.ci)
  # 2. ci.yml (typecheck + build)
  # Skip hooks here that are handled by pre-commit.yml or other workflows.
  # Keep this list in sync with workflow ownership documented in CONTRIBUTING.md.
  skip:
    - eslint
    - prettier
    - stylelint
    - typescript-check
    - knip
    - terraform_fmt
    - terraform_trivy
    - renovate-config-validator
    - hadolint
    - ls-lint
    - syncpack
    - schema-snapshots
    # lychee is a binary not installable in pre-commit.ci; its CI coverage
    # lives in link-check.yml, not pre-commit.yml.
    - lychee

repos:
  # Basic file checks
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0
    hooks:
      # File formatting
      - id: trailing-whitespace
        args: [--markdown-linebreak-ext=md]
      - id: end-of-file-fixer
      - id: mixed-line-ending
        args: [--fix=lf]

      # Syntax validation
      - id: check-yaml
        args: [--unsafe] # Allow custom YAML tags
      - id: check-json
        exclude: '\.jsonc$|\.vscode/|tsconfig|\.devcontainer/' # Skip JSONC files and dirs with JSON-with-comments

      # Prevent issues
      - id: check-added-large-files
        args: [--maxkb=1000]
      - id: check-case-conflict
      - id: check-merge-conflict
      - id: check-symlinks
      - id: destroyed-symlinks

      # Git hygiene
      - id: no-commit-to-branch
        args: [--branch, develop, --branch, main]

  # Markdown linting
  - repo: https://github.com/DavidAnson/markdownlint-cli2
    rev: v0.22.1
    hooks:
      - id: markdownlint-cli2
        args: [--fix]

  # YAML linting
  - repo: https://github.com/adrienverge/yamllint
    rev: v1.38.0
    hooks:
      - id: yamllint
        args: [--strict]

  # Vale - Prose linting
  - repo: https://github.com/errata-ai/vale
    rev: v3.14.2
    hooks:
      - id: vale
        args: [--config=.vale.ini]
        types: [markdown]

  # Terraform - Infrastructure as Code
  - repo: https://github.com/antonbabenko/pre-commit-terraform
    rev: v1.105.0
    hooks:
      - id: terraform_fmt
        args: [--args=-recursive]
      - id: terraform_trivy

  # REUSE - SPDX license compliance
  - repo: https://github.com/fsfe/reuse-tool
    rev: v6.2.0
    hooks:
      - id: reuse
        always_run: true

  # Secrets detection
  - repo: https://github.com/Yelp/detect-secrets
    rev: v1.5.0
    hooks:
      - id: detect-secrets

  # Renovate config validation
  - repo: https://github.com/renovatebot/pre-commit-hooks
    rev: 43.150.0
    hooks:
      - id: renovate-config-validator
        args: [--strict, --no-global]

  # Local hooks using package.json-managed tools. Kept local (not via
  # remote pre-commit repos) so versions stay aligned with package.json
  # and aren't perturbed by pre-commit autoupdate.
  - repo: local
    hooks:
      - id: eslint
        name: eslint
        entry: pnpm exec eslint
        language: system
        types: [javascript, jsx, ts, tsx]
        args: [--fix, --max-warnings=0]

      - id: prettier
        name: prettier
        entry: pnpm exec prettier --write
        language: system
        types_or: [javascript, jsx, ts, tsx, json, yaml, markdown, css]

      - id: stylelint
        name: stylelint
        entry: pnpm exec stylelint
        language: system
        types: [css]
        args: [--fix]

      - id: typescript-check
        name: typescript type check
        entry: pnpm exec turbo run typecheck
        language: system
        types: [ts, tsx]
        pass_filenames: false
        stages: [manual]

      # knip analyzes the whole workspace graph, so it can't be file-scoped;
      # it runs on every commit (always_run) like ls-lint. Fast enough (~1s)
      # to gate commits. CI runs it via the same hook in pre-commit.yml.
      - id: knip
        name: knip (unused files, dependencies, exports)
        entry: pnpm exec knip
        language: system
        pass_filenames: false
        always_run: true

      - id: hadolint
        name: hadolint
        entry: hadolint
        language: system
        types: [dockerfile]

      - id: lychee
        name: lychee (internal links)
        entry: lychee --offline --no-progress
        language: system
        types: [markdown]

      - id: ls-lint
        name: file naming conventions
        entry: pnpm exec ls-lint
        language: system
        pass_filenames: false
        always_run: true

      - id: syncpack
        name: exact dependency versions
        entry: pnpm exec syncpack lint
        language: system
        files: (^|/)package\.json$
        pass_filenames: false

      # Keeps the committed JSON Schema snapshots faithful to their Zod source.
      # A pure function of the working tree, so it belongs here; the base-branch
      # compatibility proof is a PR-level concern and runs in ci.yml instead. See
      # CONTRIBUTING.md "Firestore schema evolution". Runs through turbo so the
      # workspace packages the schemas import are built first; turbo can't run in
      # pre-commit.ci, so CI coverage is in pre-commit.yml.
      - id: schema-snapshots
        name: schema snapshots (regenerate from Zod)
        entry: pnpm exec turbo run schemas:export --filter=@genshin/api
        language: system
        files: ^apps/api/(src/repositories/[^/]+/schemas/|schema-snapshots/)
        pass_filenames: false
