---
coverage:
  status:
    project:
      default:
        target: auto
        threshold: 1%
    patch:
      default:
        target: auto
        threshold: 1%

comment:
  layout: reach,diff,flags,components
  behavior: default
  require_changes: false

flag_management:
  default_rules:
    carryforward: true
  individual_flags:
    - name: api
      paths:
        - apps/api/src/**
    - name: collection-json
      paths:
        - packages/collection-json/src/**
    - name: domain
      paths:
        - packages/domain/src/**
    - name: game-data
      paths:
        - packages/game-data/src/**
    - name: game-data-codegen
      paths:
        - tools/game-data-codegen/src/**
    - name: web
      paths:
        - apps/web/src/**
    - name: validation
      paths:
        - packages/validation/src/**

component_management:
  individual_components:
    - component_id: api-routes
      name: 'API: Routes'
      paths:
        - apps/api/src/routes/**
      flag_regexes:
        - api
    - component_id: api-repositories
      name: 'API: Repositories'
      paths:
        - apps/api/src/repositories/**
      flag_regexes:
        - api
    - component_id: api-middleware
      name: 'API: Middleware'
      paths:
        - apps/api/src/middleware/**
      flag_regexes:
        - api
    - component_id: api-representations
      name: 'API: Representations'
      paths:
        - apps/api/src/representations/**
      flag_regexes:
        - api
    - component_id: api-firebase
      name: 'API: Firebase'
      paths:
        - apps/api/src/lib/firebase/**
      flag_regexes:
        - api
    - component_id: game-data-versions
      name: 'Game Data: Versions'
      paths:
        - packages/game-data/src/versions.ts
      flag_regexes:
        - game-data
    - component_id: web-components
      name: 'Web: Components'
      paths:
        - apps/web/src/components/**
      flag_regexes:
        - web
    - component_id: web-features
      name: 'Web: Features'
      paths:
        - apps/web/src/features/**
      flag_regexes:
        - web
    - component_id: web-lib
      name: 'Web: Lib'
      paths:
        - apps/web/src/lib/**
      flag_regexes:
        - web
    - component_id: collection-json
      name: Collection JSON
      paths:
        - packages/collection-json/src/**
      flag_regexes:
        - collection-json
    - component_id: domain
      name: Domain
      paths:
        - packages/domain/src/**
      flag_regexes:
        - domain
    - component_id: validation
      name: Validation
      paths:
        - packages/validation/src/**
      flag_regexes:
        - validation
    - component_id: game-data-codegen
      name: Game Data Codegen
      paths:
        - tools/game-data-codegen/src/**
      flag_regexes:
        - game-data-codegen
