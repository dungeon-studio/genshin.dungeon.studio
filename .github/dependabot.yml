  # ==========================================================================
  # DOCKER
  # ==========================================================================
  - package-ecosystem: 'docker'
    directory: '/apps/api'
    schedule:
      interval: 'weekly'
      day: 'friday'
      time: '18:00'
      timezone: 'Europe/London'
    pull-request-branch-name:
      separator: '/'
    reviewers:
      - 'alunduil'
    labels:
      - 'dependencies'
      - 'docker'
      - 'api'
      - 'automated'
    groups:
      # Group all Docker updates together
      docker-api:
        patterns:
