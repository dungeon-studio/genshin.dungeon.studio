version: 2
updates:
  # ============================================================================
  # ROOT WORKSPACE
  # ============================================================================
  - package-ecosystem: 'npm'
    directory: '/'
    schedule:
      interval: 'weekly'
      day: 'saturday'
      time: '09:00'
      timezone: 'UTC'
    # Security updates: more frequent (hourly checks)
    allow:
      - dependency-type: 'direct'
      - dependency-type: 'indirect'
    open-pull-requests-limit: 5
    pull-request-branch-name:
      separator: '/'
    reviewers:
      - 'alunduil'
    labels:
      - 'dependencies'
      - 'automated'
    # Group semantically by package type
    groups:
      # Linting & formatting
      eslint:
        patterns:
          - 'eslint*'
          - '@eslint/*'
          - 'typescript-eslint'
      # TypeScript
      typescript:
        patterns:
          - 'typescript'
      # Turborepo
      turborepo:
        patterns:
          - 'turbo'
      # Prettier
      prettier:
        patterns:
          - 'prettier*'
      # Node types
      types-node:
        patterns:
          - '@types/node'

  # ============================================================================
  # FRONTEND APP (apps/web)
  # ============================================================================
  - package-ecosystem: 'npm'
    directory: '/apps/web'
    schedule:
      interval: 'weekly'
      day: 'saturday'
      time: '09:00'
      timezone: 'UTC'
    allow:
      - dependency-type: 'direct'
      - dependency-type: 'indirect'
    open-pull-requests-limit: 5
    pull-request-branch-name:
      separator: '/'
    reviewers:
      - 'alunduil'
    labels:
      - 'dependencies'
      - 'frontend'
      - 'automated'
    groups:
      # React & related
      react:
        patterns:
          - 'react*'
          - '@react*'
      # Types for React
      react-types:
        patterns:
          - '@types/react*'
      # Testing libraries
      testing:
        patterns:
          - 'vitest'
          - '@testing-library/*'
          - '@vitest/*'
      # Vite & build
      vite:
        patterns:
          - 'vite*'
          - '@vitejs/*'
      # Linting & formatting
      eslint:
        patterns:
          - 'eslint*'
          - '@eslint/*'
          - 'typescript-eslint'
          - 'eslint-plugin-*'
      # TypeScript
      typescript:
        patterns:
          - 'typescript'
      # Types packages
      types:
        patterns:
          - '@types/*'
      # Prettier
      prettier:
        patterns:
          - 'prettier*'

  # ============================================================================
  # DEVCONTAINER
  # ============================================================================
  - package-ecosystem: 'devcontainers'
    directory: '/'
    schedule:
      interval: 'weekly'
      day: 'saturday'
      time: '09:00'
      timezone: 'UTC'
    open-pull-requests-limit: 5
    pull-request-branch-name:
      separator: '/'
    reviewers:
      - 'alunduil'
    labels:
      - 'dependencies'
      - 'devcontainer'
      - 'automated'

# ============================================================================
# MAINTENANCE NOTES
# ============================================================================
# When adding new workspaces/packages to this monorepo:
# 1. Add a new entry in .github/dependabot.yml following the pattern above
# 2. Set the directory path to the workspace root (e.g., "/apps/api")
# 3. Keep semantic grouping consistent across all entries
# 4. Reference this comment in commit messages when making updates
#
# For apps/api or any new apps/:
#   - package-ecosystem: "npm"
#   - directory: "/apps/{name}"
#   - Add appropriate groups (likely react + testing if frontend)
#   - Labels: "dependencies", "{name}", "automated"
#
# For packages/* additions:
#   - package-ecosystem: "npm"
#   - directory: "/packages/{name}"
#   - Labels: "dependencies", "packages", "automated"
#
# For GitHub Actions workflows (when added):
#   - package-ecosystem: "github-actions"
#   - directory: "/"
#   - Labels: "dependencies", "ci/cd", "automated"
#
# Current coverage:
#  ✓ Root workspace (root package.json)
#  ✓ apps/web (frontend)
#  ✓ DevContainer (Docker)
# ============================================================================
