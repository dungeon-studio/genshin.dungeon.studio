version: 2

# ============================================================================
# YAML ANCHORS - Reusable configuration blocks
# ============================================================================
x-schedules:
  weekly: &weekly-schedule
    interval: 'weekly'
    day: 'saturday'
    time: '09:00'
    timezone: 'UTC'

  daily: &daily-schedule
    interval: 'daily'
    time: '09:00'
    timezone: 'UTC'

x-common: &common-settings
  open-pull-requests-limit: 5
  pull-request-branch-name:
    separator: '/'
  reviewers:
    - 'alunduil'

x-dependency-types: &all-dependency-types
  - dependency-type: 'direct'
  - dependency-type: 'indirect'

x-base-labels: &base-labels
  - 'dependencies'
  - 'automated'

# ============================================================================
# UPDATES
# ============================================================================
updates:
  # ==========================================================================
  # ROOT WORKSPACE - Regular Updates
  # ==========================================================================
  - package-ecosystem: 'npm'
    directory: '/'
    schedule: *weekly-schedule
    <<: *common-settings
    allow: *all-dependency-types
    labels: *base-labels
    groups:
      # Linting & formatting
      eslint:
        patterns:
          - 'eslint*'
          - '@eslint/*'
          - 'typescript-eslint'
      # TypeScript
      typescript:
        patterns:
          - 'typescript'
      # Turborepo
      turborepo:
        patterns:
          - 'turbo'
      # Prettier
      prettier:
        patterns:
          - 'prettier*'
      # Node types
      types-node:
        patterns:
          - '@types/node'

  # ==========================================================================
  # ROOT WORKSPACE - Security Updates (Daily)
  # ==========================================================================
  - package-ecosystem: 'npm'
    directory: '/'
    schedule: *daily-schedule
    <<: *common-settings
    allow: *all-dependency-types
    labels: *base-labels
    open-pull-requests-limit: 10
    # Security updates bypass groups and create individual PRs

  # ==========================================================================
  # FRONTEND APP (apps/web) - Regular Updates
  # ==========================================================================
  - package-ecosystem: 'npm'
    directory: '/apps/web'
    schedule: *weekly-schedule
    <<: *common-settings
    allow: *all-dependency-types
    labels:
      - 'dependencies'
      - 'frontend'
      - 'automated'
    groups:
      # React & related
      react:
        patterns:
          - 'react*'
          - '@react*'
      # Types for React
      react-types:
        patterns:
          - '@types/react*'
      # Testing libraries
      testing:
        patterns:
          - 'vitest'
          - '@testing-library/*'
          - '@vitest/*'
      # Vite & build
      vite:
        patterns:
          - 'vite*'
          - '@vitejs/*'
      # Linting & formatting
      eslint:
        patterns:
          - 'eslint*'
          - '@eslint/*'
          - 'typescript-eslint'
          - 'eslint-plugin-*'
      # TypeScript
      typescript:
        patterns:
          - 'typescript'
      # Types packages
      types:
        patterns:
          - '@types/*'
      # Prettier
      prettier:
        patterns:
          - 'prettier*'

  # ==========================================================================
  # FRONTEND APP (apps/web) - Security Updates (Daily)
  # ==========================================================================
  - package-ecosystem: 'npm'
    directory: '/apps/web'
    schedule: *daily-schedule
    <<: *common-settings
    allow: *all-dependency-types
    labels:
      - 'dependencies'
      - 'frontend'
      - 'automated'
      - 'security'
    open-pull-requests-limit: 10

  # ==========================================================================
  # DEVCONTAINER
  # ==========================================================================
  - package-ecosystem: 'devcontainers'
    directory: '/'
    schedule: *weekly-schedule
    <<: *common-settings
    labels:
      - 'dependencies'
      - 'devcontainer'
      - 'automated'

# ============================================================================
# MAINTENANCE NOTES
# ============================================================================
# When adding new workspaces/packages to this monorepo:
#
# 1. Add TWO entries per npm workspace (regular + security):
#
#    # Regular updates (weekly, with groups)
#    - package-ecosystem: "npm"
#      directory: "/apps/{name}"
#      schedule: *weekly-schedule
#      <<: *common-settings
#      allow: *all-dependency-types
#      labels: [*base-labels, "{name}"]
#      groups: { ... }
#
#    # Security updates (daily, no groups)
#    - package-ecosystem: "npm"
#      directory: "/apps/{name}"
#      schedule: *daily-schedule
#      <<: *common-settings
#      allow: *all-dependency-types
#      labels: [*base-labels, "{name}", "security"]
#      open-pull-requests-limit: 10
#
# 2. Use YAML anchors (*weekly-schedule, *common-settings, etc.) to reduce duplication
# 3. Security updates should have higher PR limits and no grouping for urgency
#
# Current coverage:
#  ✓ Root workspace (regular + security)
#  ✓ apps/web (regular + security)
#  ✓ DevContainer (weekly only, no security-specific config needed)
# ============================================================================
