  # ==========================================================================
  # TERRAFORM - BOOTSTRAP
  # ==========================================================================
  - package-ecosystem: 'terraform'
    directory: '/infrastructure/terraform/bootstrap'
    schedule:
      interval: 'weekly'
      day: 'friday'
      time: '18:00'
      timezone: 'Europe/London'
    pull-request-branch-name:
      separator: '/'
    reviewers:
      - 'alunduil'
    labels:
      - 'dependencies'
      - 'terraform'
      - 'infrastructure'
      - 'bootstrap'
      - 'automated'
