---
version: 2
updates:
  # ==========================================================================
  # ROOT WORKSPACE
  # ==========================================================================
  - package-ecosystem: 'npm'
    directory: '/'
    schedule:
      interval: 'weekly'
      day: 'friday'
      time: '18:00'
      timezone: 'Europe/London'
    pull-request-branch-name:
      separator: '/'
    reviewers:
      - 'alunduil'
    labels:
      - 'dependencies'
      - 'npm'
      - 'automated'
    groups:
      # Group all root workspace dependencies together
      npm-root:
        patterns:
          - '*'

  # ==========================================================================
  # FRONTEND APP (apps/web)
  # ==========================================================================
  - package-ecosystem: 'npm'
    directory: '/apps/web'
    schedule:
      interval: 'weekly'
      day: 'friday'
      time: '18:00'
      timezone: 'Europe/London'
    pull-request-branch-name:
      separator: '/'
    reviewers:
      - 'alunduil'
    labels:
      - 'dependencies'
      - 'npm'
      - 'web'
      - 'automated'
    groups:
      # Group all web app dependencies together
      npm-web:
        patterns:
          - '*'

  # ==========================================================================
  # BACKEND API (apps/api)
  # ==========================================================================
  - package-ecosystem: 'npm'
    directory: '/apps/api'
    schedule:
      interval: 'weekly'
      day: 'friday'
      time: '18:00'
      timezone: 'Europe/London'
    pull-request-branch-name:
      separator: '/'
    reviewers:
      - 'alunduil'
    labels:
      - 'dependencies'
      - 'npm'
      - 'api'
      - 'automated'
    groups:
      # Group all API dependencies together
      npm-api:
        patterns:
          - '*'

  # ==========================================================================
  # SHARED TYPES PACKAGE (packages/types)
  # ==========================================================================
  - package-ecosystem: 'npm'
    directory: '/packages/types'
    schedule:
      interval: 'weekly'
      day: 'friday'
      time: '18:00'
      timezone: 'Europe/London'
    pull-request-branch-name:
      separator: '/'
    reviewers:
      - 'alunduil'
    labels:
      - 'dependencies'
      - 'npm'
      - 'types'
      - 'automated'
    groups:
      # Group all types package dependencies together
      npm-types:
        patterns:
          - '*'

  # ==========================================================================
  # GAME DATA PACKAGE (packages/game-data)
  # ==========================================================================
  - package-ecosystem: 'npm'
    directory: '/packages/game-data'
    schedule:
      interval: 'weekly'
      day: 'friday'
      time: '18:00'
      timezone: 'Europe/London'
    pull-request-branch-name:
      separator: '/'
    reviewers:
      - 'alunduil'
    labels:
      - 'dependencies'
      - 'npm'
      - 'game-data'
      - 'automated'
    groups:
      # Group all game data dependencies together
      npm-game-data:
        patterns:
          - '*'

  # ==========================================================================
  # GITHUB ACTIONS
  # ==========================================================================
  - package-ecosystem: 'github-actions'
    directory: '/'
    schedule:
      interval: 'weekly'
      day: 'friday'
      time: '18:00'
      timezone: 'Europe/London'
    pull-request-branch-name:
      separator: '/'
    reviewers:
      - 'alunduil'
    labels:
      - 'dependencies'
      - 'actions'
      - 'automated'
    groups:
      # Group all GitHub Actions updates together
      github-actions:
        patterns:
          - '*'

  # ==========================================================================
  # DEVCONTAINER
  # ==========================================================================
  - package-ecosystem: 'devcontainers'
    directory: '/'
    schedule:
      interval: 'weekly'
      day: 'friday'
      time: '18:00'
      timezone: 'Europe/London'
    pull-request-branch-name:
      separator: '/'
    reviewers:
