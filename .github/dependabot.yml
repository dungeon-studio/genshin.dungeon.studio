version: 2
updates:
  # ==========================================================================
  # ROOT WORKSPACE - Regular Updates (Weekly)
  # ==========================================================================
  - package-ecosystem: 'npm'
    directory: '/'
    schedule:
      interval: 'weekly'
      day: 'friday'
      time: '18:00'
      timezone: 'Europe/London'
    allow:
      - dependency-type: 'direct'
      - dependency-type: 'indirect'
    open-pull-requests-limit: 5
    pull-request-branch-name:
      separator: '/'
    reviewers:
      - 'alunduil'
    labels:
      - 'dependencies'
      - 'automated'
    groups:
      # Linting & formatting
      eslint:
        patterns:
          - 'eslint*'
          - '@eslint/*'
          - 'typescript-eslint'
      # TypeScript
      typescript:
        patterns:
          - 'typescript'
      # Turborepo
      turborepo:
        patterns:
          - 'turbo'
      # Prettier
      prettier:
        patterns:
          - 'prettier*'
      # Node types
      types-node:
        patterns:
          - '@types/node'

  # ==========================================================================
  # ROOT WORKSPACE - Security Updates (Daily)
  # ==========================================================================
  - package-ecosystem: 'npm'
    directory: '/'
    schedule:
      interval: 'daily'
      time: '18:00'
      timezone: 'Europe/London'
    allow:
      - dependency-type: 'direct'
      - dependency-type: 'indirect'
    open-pull-requests-limit: 10
    pull-request-branch-name:
      separator: '/'
    reviewers:
      - 'alunduil'
    labels:
      - 'dependencies'
      - 'automated'
      - 'security'

  # ==========================================================================
  # FRONTEND APP (apps/web) - Regular Updates (Weekly)
  # ==========================================================================
  - package-ecosystem: 'npm'
    directory: '/apps/web'
    schedule:
      interval: 'weekly'
      day: 'friday'
      time: '18:00'
      timezone: 'Europe/London'
    allow:
      - dependency-type: 'direct'
      - dependency-type: 'indirect'
    open-pull-requests-limit: 5
    pull-request-branch-name:
      separator: '/'
    reviewers:
      - 'alunduil'
    labels:
      - 'dependencies'
      - 'frontend'
      - 'automated'
    groups:
      # React & related
      react:
        patterns:
          - 'react*'
          - '@react*'
      # Types for React
      react-types:
        patterns:
          - '@types/react*'
      # Testing libraries
      testing:
        patterns:
          - 'vitest'
          - '@testing-library/*'
          - '@vitest/*'
      # Vite & build
      vite:
        patterns:
          - 'vite*'
          - '@vitejs/*'
      # Linting & formatting
      eslint:
        patterns:
          - 'eslint*'
          - '@eslint/*'
          - 'typescript-eslint'
          - 'eslint-plugin-*'
      # TypeScript
      typescript:
        patterns:
          - 'typescript'
      # Types packages
      types:
        patterns:
          - '@types/*'
      # Prettier
      prettier:
        patterns:
          - 'prettier*'

  # ==========================================================================
  # FRONTEND APP (apps/web) - Security Updates (Daily)
  # ==========================================================================
  - package-ecosystem: 'npm'
    directory: '/apps/web'
    schedule:
      interval: 'daily'
      time: '18:00'
      timezone: 'Europe/London'
    allow:
      - dependency-type: 'direct'
      - dependency-type: 'indirect'
    open-pull-requests-limit: 10
    pull-request-branch-name:
      separator: '/'
    reviewers:
      - 'alunduil'
    labels:
      - 'dependencies'
      - 'frontend'
      - 'automated'
      - 'security'

  # ==========================================================================
  # DEVCONTAINER
  # ==========================================================================
  - package-ecosystem: 'devcontainers'
    directory: '/'
    schedule:
      interval: 'weekly'
      day: 'friday'
      time: '18:00'
      timezone: 'Europe/London'
    open-pull-requests-limit: 5
    pull-request-branch-name:
      separator: '/'
    reviewers:
      - 'alunduil'
    labels:
      - 'dependencies'
      - 'devcontainer'
      - 'automated'

