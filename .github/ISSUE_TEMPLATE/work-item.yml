---
name: Work item
description: Planned development work with a clear definition of done.
labels: [enhancement]
body:
  - type: markdown
    attributes:
      value: |
        Use this template when breaking down work that's ready to implement.
        Write the title as a statement that is true when the issue is done, for
        example: "Profile writes persist across API restarts in Firestore".

  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: One or two sentences describing what this issue delivers.
    validations:
      required: true

  - type: textarea
    id: motivation
    attributes:
      label: Motivation
      description: >-
        Why is this work needed? What problem, dependency, or opportunity
        drives it?
    validations:
      required: true

  - type: textarea
    id: scope
    attributes:
      label: Scope
      description: >-
        Concrete changes required. Be specific enough that a contributor can
        start without ambiguity.
      placeholder: |
        - Change A in `apps/web`
        - Change B in `packages/game-data`
    validations:
      required: true

  - type: textarea
    id: acceptance-criteria
    attributes:
      label: Acceptance criteria
      description: >-
        Measurable conditions that must be true when this issue is done.
        Use task list syntax (- [ ]).
      value: |
        - [ ] Typecheck and lint pass
    validations:
      required: true

  - type: textarea
    id: additional-context
    attributes:
      label: Additional context
      description: >-
        Links, screenshots, related issues, or anything else that helps.
