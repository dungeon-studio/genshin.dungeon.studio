---
name: Bug report
description: Report incorrect behavior so it can be fixed.
labels: [bug]
body:
  - type: markdown
    attributes:
      value: |
        Use this template when something is not working the way you expect.
        For the title, briefly describe what went wrong, for example:
        "Collection page shows a blank screen after adding a character".

  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: A short description of the bug.
    validations:
      required: true

  - type: textarea
    id: steps-to-reproduce
    attributes:
      label: Steps to reproduce
      description: >-
        Minimal steps to trigger the bug. Include commands, URLs, or
        interactions.
      placeholder: |
        1. Go to …
        2. Click on …
        3. Observe …
    validations:
      required: true

  - type: textarea
    id: actual-behavior
    attributes:
      label: Actual behavior
      description: What happens when you follow the steps above?
    validations:
      required: true

  - type: textarea
    id: expected-behavior
    attributes:
      label: Expected behavior
      description: What should happen instead?
    validations:
      required: true

  - type: input
    id: url
    attributes:
      label: URL
      description: >-
        If this happened in the browser, paste the page address.
      placeholder: https://genshin.dungeon.studio/teams

  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: >-
        Share any details about your setup that might be relevant.
        Fill in only what applies.
      placeholder: |
        For web issues:
        - Browser: Chrome 130
        - OS: macOS 15

        For API or backend issues:
        - Endpoint: POST /api/teams
        - Node: 22.x
        - OS: Debian 13

  - type: textarea
    id: logs
    attributes:
      label: Logs or screenshots
      description: >-
        Paste relevant console output, error messages, or attach screenshots.

  - type: textarea
    id: additional-context
    attributes:
      label: Additional context
      description: >-
        Anything else that helps: related issues, workarounds tried, frequency.
