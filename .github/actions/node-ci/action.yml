name: Node CI
description: Install Node.js + pnpm, typecheck, test with coverage, upload results to Codecov, and build

inputs:
  filter:
    description: 'Turborepo filter (e.g. @genshin/api)'
    required: true
  coverage-file:
    description: 'Path to lcov.info coverage file'
    required: true
  results-file:
    description: 'Path to junit.xml test results file'
    required: true
  flag:
    description: 'Codecov flag name'
    required: true
  codecov-token:
    description: 'Codecov upload token'
    required: true

runs:
  using: composite

  steps:
    - uses: ./.github/actions/setup-node-pnpm

    - name: Typecheck
      shell: bash
      run: pnpm turbo run typecheck --filter="${{ inputs.filter }}"

    - name: Test
      shell: bash
      run: pnpm turbo run test --filter="${{ inputs.filter }}" -- --coverage

    - name: Upload coverage to Codecov
      uses: codecov/codecov-action@v6
      with:
        token: ${{ inputs.codecov-token }}
        files: ${{ inputs.coverage-file }}
        flags: ${{ inputs.flag }}
        fail_ci_if_error: false

    - name: Upload test results to Codecov
      uses: codecov/codecov-action@v6
      with:
        token: ${{ inputs.codecov-token }}
        files: ${{ inputs.results-file }}
        flags: ${{ inputs.flag }}
        report_type: test_results
        fail_ci_if_error: false

    - name: Build
      shell: bash
      run: pnpm turbo run build --filter="${{ inputs.filter }}"
