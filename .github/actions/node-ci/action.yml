name: Node CI
description: Install Node.js + pnpm, typecheck, test with coverage, upload results to Codecov, and build

inputs:
  filter:
    description: 'Turborepo filter (e.g. @genshin/api)'
    required: true
  coverage-file:
    description: 'Path to lcov.info coverage file'
    required: true
  results-file:
    description: 'Path to junit.xml test results file'
    required: true
  flag:
    description: 'Codecov flag name'
    required: true
  codecov-token:
    description: 'Codecov upload token'
    required: true

runs:
  using: composite

  steps:
    - uses: ./.github/actions/setup-node-pnpm

    - name: Typecheck
      shell: bash
      run: pnpm turbo run typecheck --filter="${{ inputs.filter }}"

    # Seed property-based tests from the commit under test: a re-run of the same
    # commit replays identical inputs (so a failure reproduces), while a new
    # commit or PR draws fresh inputs (so the generators keep exploring). The
    # first 8 hex digits of the SHA become a 32-bit integer seed.
    - name: Derive fast-check seed
      shell: bash
      env:
        SEED_SOURCE: ${{ github.event.pull_request.head.sha || github.sha }}
      run: echo "FAST_CHECK_SEED=$((16#${SEED_SOURCE:0:8}))" >> "$GITHUB_ENV"

    - name: Test
      shell: bash
      run: pnpm turbo run test --filter="${{ inputs.filter }}" -- --coverage

    - name: Upload coverage to Codecov
      uses: codecov/codecov-action@e79a6962e0d4c0c17b229090214935d2e33f8354 # v6
      with:
        token: ${{ inputs.codecov-token }}
        files: ${{ inputs.coverage-file }}
        flags: ${{ inputs.flag }}
        fail_ci_if_error: false

    - name: Upload test results to Codecov
      uses: codecov/codecov-action@e79a6962e0d4c0c17b229090214935d2e33f8354 # v6
      with:
        token: ${{ inputs.codecov-token }}
        files: ${{ inputs.results-file }}
        flags: ${{ inputs.flag }}
        report_type: test_results
        fail_ci_if_error: false

    - name: Build
      shell: bash
      run: pnpm turbo run build --filter="${{ inputs.filter }}"
