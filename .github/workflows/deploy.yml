name: Deploy

on:
  workflow_run:
    workflows: [Terraform Apply]
    types: [completed]
    branches: [develop]

jobs:
  web:
    name: Web
    runs-on: ubuntu-latest
    environment: dev
    permissions:
      contents: read
      id-token: write

    if: github.event.workflow_run.conclusion == 'success'

    steps:
      - uses: actions/checkout@v6

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.9.0

      - uses: ./.github/actions/setup-node-pnpm

      - name: Build Web App
        run: pnpm --filter @genshin/web build

      - name: Verify Build Output
        run: bash apps/web/scripts/verify-build-output.sh

      - name: Initialize Terraform
        run: terraform -chdir=infrastructure/terraform/environments/dev init -input=false

      - uses: google-github-actions/auth@v3
        with:
          workload_identity_provider: ${{ secrets.GCP_RW_WORKLOAD_IDENTITY_PROVIDER }} # pragma: allowlist secret
          service_account: ${{ secrets.GCP_RW_DEV_SERVICE_ACCOUNT_EMAIL }} # pragma: allowlist secret

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v3

      - name: Get Bucket Name from Terraform
        run: |
          BUCKET_NAME=$(terraform -chdir=infrastructure/terraform/environments/dev output -raw web_bucket_name)
          echo "BUCKET_NAME=$BUCKET_NAME" >> $GITHUB_ENV

      - name: Deploy to Cloud Storage
        run: bash apps/web/scripts/deploy-to-cloud-storage.sh "$BUCKET_NAME"

      - name: Verify Deployment
        run: bash apps/web/scripts/verify-deployment.sh "http://${BUCKET_NAME}"
