name: Deploy

on:
  workflow_dispatch:
  push:
    branches: [develop]
    paths:
      - 'apps/web/**'
      - 'apps/api/**'
      - '.github/workflows/deploy.yml'
      - '.github/actions/setup-node-pnpm/**'

jobs:
  web:
    if: github.ref == 'refs/heads/develop'
    name: Web
    runs-on: ubuntu-latest
    environment: dev
    env:
      GCP_PROJECT_ID: dungeon-studio-genshin-dev
      FIREBASE_TOOLS: npx -y firebase-tools@15.9.0
    permissions:
      contents: read
      id-token: write

    steps:
      - uses: actions/checkout@v6

      - uses: google-github-actions/auth@v3
        with:
          workload_identity_provider: ${{ secrets.GCP_RW_WORKLOAD_IDENTITY_PROVIDER }} # pragma: allowlist secret
          service_account: ${{ secrets.GCP_RW_DEV_SERVICE_ACCOUNT_EMAIL }} # pragma: allowlist secret

      - uses: ./.github/actions/setup-node-pnpm

      - uses: hashicorp/setup-terraform@v4
        with:
          terraform_version: '1.9.0'
          terraform_wrapper: false

      - name: Read Firebase Config from Terraform
        id: firebase-config
        working-directory: infrastructure/terraform/environments/dev
        run: |
          set -euo pipefail
          terraform init -backend=true -input=false
          CFG=$(terraform output -json firebase_web_app_config)

          echo "VITE_FIREBASE_API_KEY=$(echo "$CFG" | jq -er .api_key)" \
            >> "$GITHUB_OUTPUT"
          echo "VITE_FIREBASE_AUTH_DOMAIN=$(echo "$CFG" | jq -er .auth_domain)" \
            >> "$GITHUB_OUTPUT"
          echo "VITE_FIREBASE_PROJECT_ID=$(echo "$CFG" | jq -er .project_id)" \
            >> "$GITHUB_OUTPUT"
          echo "VITE_FIREBASE_STORAGE_BUCKET=$(echo "$CFG" | jq -er .storage_bucket)" \
            >> "$GITHUB_OUTPUT"
          echo "VITE_FIREBASE_MESSAGING_SENDER_ID=$(echo "$CFG" \
            | jq -er .messaging_sender_id)" >> "$GITHUB_OUTPUT"
          echo "VITE_FIREBASE_APP_ID=$(echo "$CFG" | jq -er .app_id)" \
            >> "$GITHUB_OUTPUT"

      - name: Build
        run: pnpm turbo run build --filter=@genshin/web
        env:
          VITE_FIREBASE_API_KEY: ${{ steps.firebase-config.outputs.VITE_FIREBASE_API_KEY }}
          VITE_FIREBASE_AUTH_DOMAIN: ${{ steps.firebase-config.outputs.VITE_FIREBASE_AUTH_DOMAIN }}
          VITE_FIREBASE_PROJECT_ID: ${{ steps.firebase-config.outputs.VITE_FIREBASE_PROJECT_ID }}
          VITE_FIREBASE_STORAGE_BUCKET: ${{ steps.firebase-config.outputs.VITE_FIREBASE_STORAGE_BUCKET }}
          VITE_FIREBASE_MESSAGING_SENDER_ID: ${{ steps.firebase-config.outputs.VITE_FIREBASE_MESSAGING_SENDER_ID }}
          VITE_FIREBASE_APP_ID: ${{ steps.firebase-config.outputs.VITE_FIREBASE_APP_ID }}

      - name: Verify Build
        run: bash apps/web/scripts/verify-build-output.sh

      - name: Deploy
        run: $FIREBASE_TOOLS deploy --only hosting --project "$GCP_PROJECT_ID"
        working-directory: apps/web

      - name: Verify
        run: bash apps/web/scripts/verify-deployment.sh "https://develop.genshin.dungeon.studio"

  api:
    if: github.ref == 'refs/heads/develop'
    name: API
    runs-on: ubuntu-latest
    environment: dev
    env:
      GCP_DEV_PROJECT_ID: dungeon-studio-genshin-dev
      CLOUD_RUN_REGION: europe-west1
      CLOUD_RUN_SERVICE_NAME: api
      ARTIFACT_REPOSITORY: api
      FRONTEND_ORIGIN: https://develop.genshin.dungeon.studio
    permissions:
      contents: read
      id-token: write

    steps:
      - uses: actions/checkout@v6

      - uses: google-github-actions/auth@v3
        with:
          workload_identity_provider: ${{ secrets.GCP_RW_WORKLOAD_IDENTITY_PROVIDER }} # pragma: allowlist secret
          service_account: ${{ secrets.GCP_RW_DEV_SERVICE_ACCOUNT_EMAIL }} # pragma: allowlist secret

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v3

      - name: Configure Docker Auth
        run: gcloud auth configure-docker "${CLOUD_RUN_REGION}-docker.pkg.dev" --quiet

      - name: Setup Buildx
        uses: docker/setup-buildx-action@v4

      - name: Extract Metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.CLOUD_RUN_REGION }}-docker.pkg.dev/${{ env.GCP_DEV_PROJECT_ID }}/${{
            env.ARTIFACT_REPOSITORY }}/${{ env.CLOUD_RUN_SERVICE_NAME }}
          tags: |
            type=ref,event=branch
            type=sha,prefix={{branch}}-,format=short

      - name: Build & Push Image
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ./apps/api/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Resolve Image
        id: image
        run: |
          BRANCH_NAME=$(echo "$GITHUB_REF_NAME" | tr '[:upper:]' '[:lower:]' | sed 's|/|-|g')
          IMAGE_URI="${CLOUD_RUN_REGION}-docker.pkg.dev/${GCP_DEV_PROJECT_ID}/${ARTIFACT_REPOSITORY}/${CLOUD_RUN_SERVICE_NAME}:${BRANCH_NAME}-${GITHUB_SHA::7}"
          echo "image_uri=$IMAGE_URI" >> "$GITHUB_OUTPUT"

      - name: Log Tags & Image
        run: |
          echo "Published image tags:"
          printf '%s\n' "${{ steps.meta.outputs.tags }}"
          echo "Deploy image URI: ${{ steps.image.outputs.image_uri }}"

      # Service lifecycle is intentionally CI-managed for fast app rollouts.
      # Terraform in dev manages supporting infra (APIs, Artifact Registry,
      # and domain mapping), but does not define the Cloud Run service itself.
      # This split is intentional and may diverge further for release/prod.
      - name: Deploy
        id: deploy
        uses: google-github-actions/deploy-cloudrun@v3
        with:
          project_id: ${{ env.GCP_DEV_PROJECT_ID }}
          region: ${{ env.CLOUD_RUN_REGION }}
          service: ${{ env.CLOUD_RUN_SERVICE_NAME }}
          image: ${{ steps.image.outputs.image_uri }}
          flags: >-
            --allow-unauthenticated
            --cpu=1
            --memory=512Mi
            --concurrency=80
          env_vars: |
            FRONTEND_ORIGIN=${{ env.FRONTEND_ORIGIN }}
            APP_GIT_SHA=${{ github.sha }}

      - name: Verify Public Health
        continue-on-error: true
        run: >-
          curl -fsSL "${{ steps.deploy.outputs.url }}/health"
          | jq -e '.status == "ok"'

      - uses: ./.github/actions/setup-node-pnpm

      - name: Generate Verify Token
        id: verify-token
        uses: google-github-actions/auth@v3
        with:
          workload_identity_provider: ${{ secrets.GCP_RW_WORKLOAD_IDENTITY_PROVIDER }} # pragma: allowlist secret
          service_account: ${{ secrets.GCP_RW_DEV_SERVICE_ACCOUNT_EMAIL }} # pragma: allowlist secret
          token_format: id_token
          id_token_audience: ${{ steps.deploy.outputs.url }}

      - name: Verify Authenticated Health
        env:
          HEALTH_BEARER_TOKEN: ${{ steps.verify-token.outputs.id_token }}
        run: pnpm --filter @genshin/api exec tsx scripts/verify-deployment.ts "${{ steps.deploy.outputs.url }}"
