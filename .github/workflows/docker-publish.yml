---
name: Docker Publish

on:
  push:
    branches:
      - develop

jobs:
  publish:
    name: Build and push Docker image
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}/api
          tags: |
            type=ref,event=branch
            type=sha,prefix={{branch}}-

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./apps/api/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
# ---------------------------------------------------------------------------
# Maintenance notes
# ---------------------------------------------------------------------------
# This workflow builds and publishes the backend API Docker image to GitHub
# Container Registry when code is merged to the develop branch.
#
# Image naming: ghcr.io/dungeon-studio/genshin.dungeon.studio/api:develop
#
# The image is tagged with:
#  - Branch name (develop)
#  - Commit SHA prefixed with branch name (develop-abc1234)
#
# Write permissions are only granted to this workflow, which runs on trusted
# code that has passed review.
#
# GitHub Actions cache is used to speed up builds with layer caching.
# ---------------------------------------------------------------------------
