name: Terraform Deploy

on:
  push:
    branches: [develop]
    paths:
      - 'infrastructure/terraform/**'
      - '.github/workflows/terraform-deploy.yml'
  pull_request:
    branches: [develop]
    paths:
      - 'infrastructure/terraform/**'
      - '.github/workflows/terraform-deploy.yml'

jobs:
  terraform:
    runs-on: ubuntu-latest
    environment: ${{ matrix.environment }}
    permissions:
      contents: read
      id-token: write
      pull-requests: write

    strategy:
      matrix:
        include:
          - environment: shared
            service_account_secret: GCP_SHARED_SERVICE_ACCOUNT_EMAIL # pragma: allowlist secret
          - environment: dev
            service_account_secret: GCP_DEV_SERVICE_ACCOUNT_EMAIL # pragma: allowlist secret

    steps:
      - uses: actions/checkout@v4

      - uses: hashicorp/setup-terraform@v2
        with:
          terraform_version: ~> 1.0

      # Authenticate to GCP using Workload Identity
      - uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }} # pragma: allowlist secret
          service_account: ${{ secrets[matrix.service_account_secret] }} # pragma: allowlist secret

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v1

      - name: Terraform Init
        working-directory: infrastructure/terraform/environments/${{ matrix.environment }}
        run: terraform init

      - name: Terraform Plan
        id: plan
        working-directory: infrastructure/terraform/environments/${{ matrix.environment }}
        env:
          TF_VAR_gcp_shared_project_id: ${{ secrets.GCP_SHARED_PROJECT_ID }} # pragma: allowlist secret
          TF_VAR_gcp_dev_project_id: ${{ secrets.GCP_DEV_PROJECT_ID }} # pragma: allowlist secret
        run: |
          terraform plan -no-color -out=tfplan
          terraform show -no-color tfplan > plan.txt

      - name: Comment PR with Plan
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const workspaceRoot = process.env.GITHUB_WORKSPACE;
            const envPath = '${{ matrix.environment }}';
            const planPath = `${workspaceRoot}/infrastructure/terraform/environments/${envPath}/plan.txt`;
            const plan = fs.readFileSync(planPath, 'utf8');
            const environment = '${{ matrix.environment }}';
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `## Terraform Plan - ${environment}\n\n\`\`\`\n${plan}\n\`\`\``
            });

      - name: Terraform Apply
        if: github.event_name == 'push' && github.ref == 'refs/heads/develop'
        working-directory: infrastructure/terraform/environments/${{ matrix.environment }}
        env:
          TF_VAR_gcp_shared_project_id: ${{ secrets.GCP_SHARED_PROJECT_ID }} # pragma: allowlist secret
          TF_VAR_gcp_dev_project_id: ${{ secrets.GCP_DEV_PROJECT_ID }} # pragma: allowlist secret
        run: terraform apply -auto-approve tfplan
