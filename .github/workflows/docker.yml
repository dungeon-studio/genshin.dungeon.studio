---
name: Docker

on:
  pull_request:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build and Run
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5 # v4

      - name: Build image
        uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf # v7
        with:
          context: .
          file: ./apps/api/Dockerfile
          push: false
          load: true
          tags: api-smoke:test
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Smoke-test container startup
        run: bash apps/api/scripts/smoke-test-container.sh

      - name: Dump container logs on failure
        if: failure()
        run: docker logs api-smoke 2>&1 || true

      - name: Cleanup container
        if: always()
        run: docker rm -f api-smoke 2>/dev/null || true
# ---------------------------------------------------------------------------
# Maintenance notes
# ---------------------------------------------------------------------------
# This workflow validates that the API Docker image builds and starts
# correctly on pull requests. It does not push to any registry.
#
# Read-only permissions prevent any potential security issues from PR code
# accessing write tokens.
#
# GitHub Actions cache is used to speed up builds with layer caching.
# ---------------------------------------------------------------------------
