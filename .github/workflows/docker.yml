---
name: Docker

on:
  pull_request:
  push:
    branches:
      - develop

jobs:
  build:
    name: Build and push Docker image
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
      packages: ${{ github.event_name == 'push' && github.ref == 'refs/heads/develop' && 'write' || 'read' }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        if: github.event_name == 'push' && github.ref == 'refs/heads/develop'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ghcr.io/${{ github.repository }}/api
          tags: |
            type=ref,event=branch
            type=sha,prefix={{branch}}-

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./apps/api/Dockerfile
          push: ${{ github.event_name == 'push' && github.ref == 'refs/heads/develop' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
# ---------------------------------------------------------------------------
# Maintenance notes
# ---------------------------------------------------------------------------
# This workflow builds the backend API Docker image on every pull request
# to verify the build succeeds, and pushes to GitHub Container Registry
# when code is merged to the develop branch.
#
# Image naming: ghcr.io/dungeon-studio/genshin.dungeon.studio/api:develop
#
# The image is tagged with:
#  - Branch name (develop)
#  - Commit SHA prefixed with branch name (develop-abc1234)
#
# GitHub Actions cache is used to speed up builds with layer caching.
# ---------------------------------------------------------------------------
