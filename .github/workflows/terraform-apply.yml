name: Terraform Apply

on:
  push:
    branches: [develop]
    paths:
      - 'infrastructure/terraform/**'
      - '.github/workflows/terraform-apply.yml'

jobs:
  terraform-plan:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write

    strategy:
      matrix:
        include:
          - environment: shared
            service_account_secret: GCP_RO_SHARED_SERVICE_ACCOUNT_EMAIL # pragma: allowlist secret
          - environment: dev
            service_account_secret: GCP_RO_DEV_SERVICE_ACCOUNT_EMAIL # pragma: allowlist secret

    steps:
      - uses: actions/checkout@v4

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: '1.9.0'

      # Authenticate to GCP using Workload Identity
      - uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_RO_WORKLOAD_IDENTITY_PROVIDER }} # pragma: allowlist secret
          service_account: ${{ secrets[matrix.service_account_secret] }} # pragma: allowlist secret

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v1

      - name: Terraform Init
        working-directory: infrastructure/terraform/environments/${{ matrix.environment }}
        run: terraform init

      - name: Terraform Plan
        id: plan
        working-directory: infrastructure/terraform/environments/${{ matrix.environment }}
        env:
          TF_VAR_gcp_shared_project_id: ${{ secrets.GCP_RO_SHARED_PROJECT_ID }} # pragma: allowlist secret
          TF_VAR_gcp_dev_project_id: ${{ secrets.GCP_RO_DEV_PROJECT_ID }} # pragma: allowlist secret
        run: |
          terraform plan -lock=false -no-color -out=tfplan
          terraform show -no-color tfplan > plan.txt

      - name: Upload Terraform Plan
        uses: actions/upload-artifact@v4
        with:
          name: tfplan-${{ matrix.environment }}
          path: |
            infrastructure/terraform/environments/${{ matrix.environment }}/tfplan
            infrastructure/terraform/environments/${{ matrix.environment }}/plan.txt

  terraform-apply:
    runs-on: ubuntu-latest
    environment: ${{ matrix.environment }}
    permissions:
      contents: read
      id-token: write

    needs: terraform-plan

    strategy:
      matrix:
        include:
          - environment: shared
            service_account_secret: GCP_SHARED_SERVICE_ACCOUNT_EMAIL # pragma: allowlist secret
          - environment: dev
            service_account_secret: GCP_DEV_SERVICE_ACCOUNT_EMAIL # pragma: allowlist secret

    steps:
      - uses: actions/checkout@v4

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: '1.9.0'

      # Authenticate to GCP using Workload Identity
      - uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }} # pragma: allowlist secret
          service_account: ${{ secrets[matrix.service_account_secret] }} # pragma: allowlist secret

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v1

      - name: Terraform Init
        working-directory: infrastructure/terraform/environments/${{ matrix.environment }}
        run: terraform init

      - name: Download Terraform Plan
        uses: actions/download-artifact@v4
        with:
          name: tfplan-${{ matrix.environment }}
          path: infrastructure/terraform/environments/${{ matrix.environment }}

      - name: Terraform Apply
        working-directory: infrastructure/terraform/environments/${{ matrix.environment }}
        env:
          TF_VAR_gcp_shared_project_id: ${{ secrets.GCP_SHARED_PROJECT_ID }} # pragma: allowlist secret
          TF_VAR_gcp_dev_project_id: ${{ secrets.GCP_DEV_PROJECT_ID }} # pragma: allowlist secret
        run: terraform apply -auto-approve tfplan
