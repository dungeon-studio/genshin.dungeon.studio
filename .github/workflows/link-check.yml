---
name: Link Check

on:
  pull_request:
    paths:
      - '**.md'
      - '.lychee.toml'
  push:
    branches:
      - develop
    paths:
      - '**.md'
      - '.lychee.toml'

permissions:
  contents: read

jobs:
  internal-links:
    name: Internal Links
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Check internal links
        uses: lycheeverse/lychee-action@v2
        with:
          args: >-
            --offline
            --no-progress
            'docs/**/*.md'
            README.md
            CHANGELOG.md
            CONTRIBUTING.md
            '.github/copilot-instructions.md'
          fail: true

  external-links:
    name: External Links
    runs-on: ubuntu-latest
    timeout-minutes: 10
    continue-on-error: true

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Check external links
        uses: lycheeverse/lychee-action@v2
        with:
          args: >-
            --no-progress
            'docs/**/*.md'
            README.md
            CHANGELOG.md
            CONTRIBUTING.md
            '.github/copilot-instructions.md'
          fail: true
          token: ${{ secrets.GITHUB_TOKEN }}
