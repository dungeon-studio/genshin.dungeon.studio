name: 'CodeQL'

on:
  push:
    branches:
      - develop
      - main
  pull_request:
  schedule:
    # Weekly scan on Fridays at 6 PM UTC to align with Dependabot schedule
    - cron: '0 18 * * 5'

jobs:
  analyze:
    name: Analyze (${{ matrix.language }})
    runs-on: ubuntu-latest
    timeout-minutes: 360
    permissions:
      security-events: write
      contents: read

    strategy:
      fail-fast: false
      matrix:
        include:
          - language: javascript-typescript
            build-mode: autobuild

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: ${{ matrix.language }}
          build-mode: ${{ matrix.build-mode }}
          # Use security-extended suite for comprehensive security scanning
          queries: security-extended

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v3
        with:
          category: '/language:${{ matrix.language }}'

# ---------------------------------------------------------------------------
# Maintenance notes (see also: .github/dependabot.yml maintenance section)
#
# This workflow currently runs CodeQL for:
# - javascript-typescript (Node.js/TypeScript monorepo)
#
# When updating the monorepo, review and update this workflow if:
#
# 1) New programming languages are added
#    - Add additional entries under `strategy.matrix.include` with the
#      appropriate `language` and `build-mode` values supported by CodeQL.
#
# 2) Build process changes require custom build steps
#    - If `autobuild` is no longer sufficient (e.g., custom build scripts,
#      multiple build targets, or non-standard tooling), replace or augment
#      the current `build-mode: autobuild` configuration with explicit
#      build steps between `Initialize CodeQL` and `Perform CodeQL Analysis`.
#
# 3) New workspaces are added that use different languages or runtimes
#    - Ensure all new language-specific workspaces are covered by this
#      workflow by updating the matrix and any required build commands so
#      that CodeQL analyzes all supported parts of the monorepo.
#
# Keeping this file in sync with the active languages and build processes
# in the monorepo is essential for comprehensive security scanning.
# ---------------------------------------------------------------------------
