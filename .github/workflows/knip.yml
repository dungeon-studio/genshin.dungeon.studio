---
name: Knip

on:
  pull_request:
  push:
    branches:
      - develop
      - main

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/develop' && github.ref != 'refs/heads/main' }}

jobs:
  # Reports unused files, dependencies, and exports across the workspace graph.
  # Blocks on unused dependencies/files/binaries; unused exports and types run
  # at "warn" severity (knip.jsonc) and don't fail the build while the existing
  # findings are triaged.
  knip:
    name: Unused Dependencies
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - uses: ./.github/actions/setup-node-pnpm

      - name: Run knip
        run: pnpm knip
