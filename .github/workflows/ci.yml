---
name: CI

on:
  pull_request:
  push:
    branches:
      - develop

permissions:
  contents: read

jobs:
  web:
    name: Web
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - uses: ./.github/actions/node-ci
        with:
          filter: '@genshin/web'
          coverage-file: apps/web/coverage/lcov.info
          results-file: apps/web/test-results/junit.xml
          flag: web
          codecov-token: ${{ secrets.CODECOV_TOKEN }}

      - name: Verify Build Artifacts
        run: bash apps/web/scripts/verify-build-output.sh

  api:
    name: API
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - uses: ./.github/actions/node-ci
        with:
          filter: '@genshin/api'
          coverage-file: apps/api/coverage/lcov.info
          results-file: apps/api/test-results/junit.xml
          flag: api
          codecov-token: ${{ secrets.CODECOV_TOKEN }}

  game-data:
    name: Game Data
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - uses: ./.github/actions/node-ci
        with:
          filter: '@genshin/game-data'
          coverage-file: packages/game-data/coverage/lcov.info
          results-file: packages/game-data/test-results/junit.xml
          flag: game-data
          codecov-token: ${{ secrets.CODECOV_TOKEN }}

  domain:
    name: Domain
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - uses: ./.github/actions/node-ci
        with:
          filter: '@genshin/domain'
          coverage-file: packages/domain/coverage/lcov.info
          results-file: packages/domain/test-results/junit.xml
          flag: domain
          codecov-token: ${{ secrets.CODECOV_TOKEN }}

  collection-json:
    name: Collection JSON
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - uses: ./.github/actions/node-ci
        with:
          filter: '@genshin/collection-json'
          coverage-file: packages/collection-json/coverage/lcov.info
          results-file: packages/collection-json/test-results/junit.xml
          flag: collection-json
          codecov-token: ${{ secrets.CODECOV_TOKEN }}

  validation:
    name: Validation
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - uses: ./.github/actions/node-ci
        with:
          filter: '@genshin/validation'
          coverage-file: packages/validation/coverage/lcov.info
          results-file: packages/validation/test-results/junit.xml
          flag: validation
          codecov-token: ${{ secrets.CODECOV_TOKEN }}

# ---------------------------------------------------------------------------
# Maintenance notes
# - Add a new job when new apps or packages are added.
# - Keep caching strategy aligned with package manager changes.
# ---------------------------------------------------------------------------
