---
name: CI

on:
  pull_request:
  push:
    branches:
      - develop

permissions:
  contents: read

jobs:
  web:
    name: Web
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - uses: ./.github/actions/setup-node-pnpm

      - name: Typecheck
        run: pnpm turbo run typecheck --filter=@genshin/web

      - name: Build
        run: pnpm turbo run build --filter=@genshin/web

      - name: Verify Build Artifacts
        run: bash apps/web/scripts/verify-build-output.sh

  api:
    name: API
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - uses: ./.github/actions/setup-node-pnpm

      - name: Typecheck
        run: pnpm turbo run typecheck --filter=@genshin/api

      - name: Test
        run: pnpm turbo run test --filter=@genshin/api -- --coverage

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v5
        with:
          files: apps/api/coverage/lcov.info
          flags: api
          fail_ci_if_error: false

      - name: Build
        run: pnpm turbo run build --filter=@genshin/api

  packages:
    name: Packages
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - uses: ./.github/actions/setup-node-pnpm

      - name: Build packages
        run: pnpm turbo run build --filter="./packages/**"

      - name: Typecheck packages
        run: pnpm turbo run typecheck --filter="./packages/**"

# ---------------------------------------------------------------------------
# Maintenance notes
# - Add a new job when new apps are added.
# - Package builds are grouped under the Packages job.
# - Keep caching strategy aligned with package manager changes.
# ---------------------------------------------------------------------------
