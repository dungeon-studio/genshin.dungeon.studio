---
name: CI

on:
  pull_request:
  push:
    branches:
      - develop

permissions:
  contents: read

jobs:
  web:
    name: Web
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - uses: ./.github/actions/setup-node-pnpm

      - name: Typecheck
        run: pnpm --filter @genshin/web typecheck

      - name: Build
        run: pnpm --filter @genshin/web build

      - name: Verify Build Artifacts
        run: bash apps/web/scripts/verify-build-output.sh

  api:
    name: API
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - uses: ./.github/actions/setup-node-pnpm

      - name: Typecheck
        run: pnpm --filter @genshin/api typecheck

      - name: Build
        run: pnpm --filter @genshin/api build

  packages:
    name: Packages
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - uses: ./.github/actions/setup-node-pnpm

      - name: Build packages
        run: pnpm --filter "./packages/**" build

      - name: Typecheck packages
        run: pnpm --filter "./packages/**" typecheck

# ---------------------------------------------------------------------------
# Maintenance notes
# - Add a new job when new apps are added.
# - Package builds are grouped under the Packages job.
# - Keep caching strategy aligned with package manager changes.
# ---------------------------------------------------------------------------
