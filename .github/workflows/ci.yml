---
name: CI

on:
  pull_request:
  push:
    branches:
      - develop

permissions:
  contents: read

jobs:
  web:
    name: Web
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - uses: ./.github/actions/setup-node-pnpm

      - name: Typecheck
        run: pnpm turbo run typecheck --filter=@genshin/web

      - name: Build
        run: pnpm turbo run build --filter=@genshin/web

      - name: Verify Build Artifacts
        run: bash apps/web/scripts/verify-build-output.sh

  api:
    name: API
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - uses: ./.github/actions/setup-node-pnpm

      - name: Typecheck
        run: pnpm turbo run typecheck --filter=@genshin/api

      - name: Test
        run: pnpm turbo run test --filter=@genshin/api -- --coverage

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v5
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: apps/api/coverage/lcov.info
          flags: api
          fail_ci_if_error: false

      - name: Upload test results to Codecov
        uses: codecov/codecov-action@v5
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: apps/api/test-results/junit.xml
          flags: api
          report_type: test_results
          fail_ci_if_error: false

      - name: Build
        run: pnpm turbo run build --filter=@genshin/api

  game-data:
    name: Game Data
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - uses: ./.github/actions/setup-node-pnpm

      - name: Build
        run: pnpm turbo run build --filter=@genshin/game-data

      - name: Typecheck
        run: pnpm turbo run typecheck --filter=@genshin/game-data

  domain:
    name: Domain
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - uses: ./.github/actions/setup-node-pnpm

      - name: Build
        run: pnpm turbo run build --filter=@genshin/domain

      - name: Typecheck
        run: pnpm turbo run typecheck --filter=@genshin/domain

  collection-json:
    name: Collection JSON
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - uses: ./.github/actions/setup-node-pnpm

      - name: Build
        run: pnpm turbo run build --filter=@genshin/collection-json

      - name: Typecheck
        run: pnpm turbo run typecheck --filter=@genshin/collection-json

      - name: Test
        run: pnpm turbo run test --filter=@genshin/collection-json -- --coverage

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v5
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: packages/collection-json/coverage/lcov.info
          flags: collection-json
          fail_ci_if_error: false

      - name: Upload test results to Codecov
        uses: codecov/codecov-action@v5
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: packages/collection-json/test-results/junit.xml
          flags: collection-json
          report_type: test_results
          fail_ci_if_error: false

# ---------------------------------------------------------------------------
# Maintenance notes
# - Add a new job when new apps or packages are added.
# - Keep caching strategy aligned with package manager changes.
# ---------------------------------------------------------------------------
