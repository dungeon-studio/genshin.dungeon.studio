---
name: CI

on:
  pull_request:
  push:
    branches:
      - develop

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/develop' }}

jobs:
  test:
    name: ${{ matrix.display }}
    runs-on: ubuntu-latest
    timeout-minutes: 15

    strategy:
      fail-fast: false
      matrix:
        include:
          - display: Web
            filter: '@genshin/web'
            path-prefix: apps/web
            flag: web
          - display: API
            filter: '@genshin/api'
            path-prefix: apps/api
            flag: api
          - display: Game Data
            filter: '@genshin/game-data'
            path-prefix: packages/game-data
            flag: game-data
          - display: Domain
            filter: '@genshin/domain'
            path-prefix: packages/domain
            flag: domain
          - display: Collection JSON
            filter: '@genshin/collection-json'
            path-prefix: packages/collection-json
            flag: collection-json
          - display: Validation
            filter: '@genshin/validation'
            path-prefix: packages/validation
            flag: validation

    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - uses: ./.github/actions/node-ci
        with:
          filter: ${{ matrix.filter }}
          coverage-file: ${{ matrix.path-prefix }}/coverage/lcov.info
          results-file: ${{ matrix.path-prefix }}/test-results/junit.xml
          flag: ${{ matrix.flag }}
          codecov-token: ${{ secrets.CODECOV_TOKEN }}

      - name: Verify Build Artifacts
        if: matrix.flag == 'web'
        run: bash apps/web/scripts/verify-build-output.sh

# ---------------------------------------------------------------------------
# Maintenance notes
# - Add a new matrix entry under strategy.matrix.include when new apps or
#   packages are added.
# - Keep caching strategy aligned with package manager changes.
# ---------------------------------------------------------------------------
