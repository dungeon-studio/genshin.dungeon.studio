---
name: CI

on:
  pull_request:
  push:
    branches:
      - develop

permissions:
  contents: read

jobs:
  web:
    name: Web
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - uses: ./.github/actions/setup-node-pnpm

      - name: Typecheck
        run: pnpm turbo run typecheck --filter=@genshin/web

      - name: Build
        run: pnpm turbo run build --filter=@genshin/web

      - name: Verify Build Artifacts
        run: bash apps/web/scripts/verify-build-output.sh

  api:
    name: API
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - uses: ./.github/actions/setup-node-pnpm

      - name: Typecheck
        run: pnpm turbo run typecheck --filter=@genshin/api

      - uses: ./.github/actions/test-and-upload-coverage
        with:
          filter: '@genshin/api'
          coverage-file: apps/api/coverage/lcov.info
          results-file: apps/api/test-results/junit.xml
          flag: api
          codecov-token: ${{ secrets.CODECOV_TOKEN }}

      - name: Build
        run: pnpm turbo run build --filter=@genshin/api

  game-data:
    name: Game Data
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - uses: ./.github/actions/setup-node-pnpm

      - name: Build
        run: pnpm turbo run build --filter=@genshin/game-data

      - name: Typecheck
        run: pnpm turbo run typecheck --filter=@genshin/game-data

      - uses: ./.github/actions/test-and-upload-coverage
        with:
          filter: '@genshin/game-data'
          coverage-file: packages/game-data/coverage/lcov.info
          results-file: packages/game-data/test-results/junit.xml
          flag: game-data
          codecov-token: ${{ secrets.CODECOV_TOKEN }}

  domain:
    name: Domain
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - uses: ./.github/actions/setup-node-pnpm

      - name: Build
        run: pnpm turbo run build --filter=@genshin/domain

      - name: Typecheck
        run: pnpm turbo run typecheck --filter=@genshin/domain

  collection-json:
    name: Collection JSON
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - uses: ./.github/actions/setup-node-pnpm

      - name: Build
        run: pnpm turbo run build --filter=@genshin/collection-json

      - name: Typecheck
        run: pnpm turbo run typecheck --filter=@genshin/collection-json

      - uses: ./.github/actions/test-and-upload-coverage
        with:
          filter: '@genshin/collection-json'
          coverage-file: packages/collection-json/coverage/lcov.info
          results-file: packages/collection-json/test-results/junit.xml
          flag: collection-json
          codecov-token: ${{ secrets.CODECOV_TOKEN }}

  validation:
    name: Validation
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - uses: ./.github/actions/setup-node-pnpm

      - name: Build
        run: pnpm turbo run build --filter=@genshin/validation

      - name: Typecheck
        run: pnpm turbo run typecheck --filter=@genshin/validation

# ---------------------------------------------------------------------------
# Maintenance notes
# - Add a new job when new apps or packages are added.
# - Keep caching strategy aligned with package manager changes.
# ---------------------------------------------------------------------------
