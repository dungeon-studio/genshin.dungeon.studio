name: Terraform Apply Reusable

on:
  workflow_call:
    inputs:
      environment:
        required: true
        type: string

permissions:
  contents: read

jobs:
  terraform-apply:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    environment: ${{ inputs.environment }}
    permissions:
      contents: read
      id-token: write
    # Shared concurrency group prevents state lock contention on the GCS bucket.
    # All environments write to dungeon-studio-genshin-tfstate, so only one apply
    # can run at a time across ALL workflow runs to prevent conflicts.
    # The 'needs' keyword only orders jobs within a single workflow run.
    concurrency:
      group: terraform-apply
      cancel-in-progress: false

    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - uses: hashicorp/setup-terraform@dfe3c3f87815947d99a8997f908cb6525fc44e9e # v4.0.1
        with:
          terraform_version: '1.9.0'

      # Each environment maps to an explicit secret to avoid dynamic secret
      # indexing, which fixes CodeQL actions/excessive-secrets-exposure.
      - uses: google-github-actions/auth@7c6bc770dae815cd3e89ee6cdf493a5fab2cc093 # v3.0.0
        with:
          workload_identity_provider: ${{ secrets.GCP_RW_WORKLOAD_IDENTITY_PROVIDER }} # pragma: allowlist secret
          service_account: >-
            ${{
              inputs.environment == 'core' && secrets.GCP_RW_CORE_SERVICE_ACCOUNT_EMAIL ||
              inputs.environment == 'dev' && secrets.GCP_RW_DEV_SERVICE_ACCOUNT_EMAIL ||
              inputs.environment == 'staging' && secrets.GCP_RW_STAGING_SERVICE_ACCOUNT_EMAIL
            }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@aa5489c8933f4cc7a4f7d45035b3b1440c9c10db # v3.0.1

      - name: Terraform Init
        working-directory: infrastructure/terraform/environments/${{ inputs.environment }}
        run: terraform init

      - name: Terraform Plan
        working-directory: infrastructure/terraform/environments/${{ inputs.environment }}
        run: terraform plan -lock=false -no-color -out=tfplan

      - name: Terraform Apply
        working-directory: infrastructure/terraform/environments/${{ inputs.environment }}
        run: terraform apply -auto-approve tfplan
