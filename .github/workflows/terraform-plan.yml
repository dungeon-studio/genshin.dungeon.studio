name: Terraform Plan

on:
  pull_request:
    branches: [develop]
    paths:
      - 'infrastructure/terraform/**'
      - '.github/workflows/terraform-plan.yml'

jobs:
  terraform-plan:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
      pull-requests: write

    strategy:
      fail-fast: false
      matrix:
        include:
          - environment: shared
            service_account_secret: GCP_RO_SHARED_SERVICE_ACCOUNT_EMAIL # pragma: allowlist secret
          - environment: dev
            service_account_secret: GCP_RO_DEV_SERVICE_ACCOUNT_EMAIL # pragma: allowlist secret

    steps:
      - uses: actions/checkout@v4

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: '1.9.0'

      # Authenticate to GCP using Workload Identity
      - uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_RO_WORKLOAD_IDENTITY_PROVIDER }} # pragma: allowlist secret
          service_account: ${{ secrets[matrix.service_account_secret] }} # pragma: allowlist secret

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v1

      - name: Terraform Init
        working-directory: infrastructure/terraform/environments/${{ matrix.environment }}
        run: terraform init

      - name: Terraform Plan
        id: plan
        working-directory: infrastructure/terraform/environments/${{ matrix.environment }}
        run: |
          terraform plan -lock=false -no-color -out=tfplan
          terraform show -no-color tfplan > plan.txt

      - name: Comment PR with Plan
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const workspaceRoot = process.env.GITHUB_WORKSPACE;
            const envPath = '${{ matrix.environment }}';
            const planPath = `${workspaceRoot}/infrastructure/terraform/environments/${envPath}/plan.txt`;
            const plan = fs.readFileSync(planPath, 'utf8');
            const environment = '${{ matrix.environment }}';
            const runUrl = [
              'https://github.com',
              context.repo.owner,
              context.repo.repo,
              'actions',
              'runs',
              process.env.GITHUB_RUN_ID
            ].join('/');
            const maxChars = 60000;
            const truncated = plan.length > maxChars;
            const planBody = truncated ? `${plan.slice(0, maxChars)}\n\n[truncated]` : plan;
            const marker = `<!-- terraform-plan:${environment} -->`;
            const body = [
              marker,
              `## Terraform Plan - ${environment}`,
              '',
              '<details>',
              '<summary>Show plan output</summary>',
              '',
              '```',
              planBody,
              '```',
              '</details>',
              '',
              `Logs: ${runUrl}`
            ].join('\n');

            const comments = await github.rest.issues.listComments({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo
            });

            const existing = comments.data.find(comment => comment.body.includes(marker));

            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body
              });
              return;
            }

            await github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body
            });
