name: Terraform Plan

on:
  pull_request:
    branches: [develop, main, 'release/**']
    paths:
      - 'infrastructure/terraform/environments/**'
      - '.github/workflows/terraform-plan.yml'

jobs:
  terraform-plan:
    name: ${{ matrix.environment }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
      pull-requests: write

    strategy:
      fail-fast: false
      matrix:
        include:
          - environment: core
            service_account_secret: GCP_RO_CORE_SERVICE_ACCOUNT_EMAIL # pragma: allowlist secret
          - environment: dev
            service_account_secret: GCP_RO_DEV_SERVICE_ACCOUNT_EMAIL # pragma: allowlist secret
          - environment: staging
            service_account_secret: GCP_RO_STAGING_SERVICE_ACCOUNT_EMAIL # pragma: allowlist secret

    steps:
      - uses: actions/checkout@v6

      - uses: hashicorp/setup-terraform@v4
        with:
          terraform_version: '1.9.0'

      # Authenticate to GCP using Workload Identity
      - uses: google-github-actions/auth@v3
        with:
          workload_identity_provider: ${{ secrets.GCP_RO_WORKLOAD_IDENTITY_PROVIDER }} # pragma: allowlist secret
          service_account: ${{ secrets[matrix.service_account_secret] }} # pragma: allowlist secret

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v3

      - name: Terraform Init
        working-directory: infrastructure/terraform/environments/${{ matrix.environment }}
        run: terraform init

      # Terraform validate runs in CI (not pre-commit) because it requires
      # backend initialization and GCS bucket authentication via WIF.
      - name: Terraform Validate
        working-directory: infrastructure/terraform/environments/${{ matrix.environment }}
        run: terraform validate

      - name: Terraform Plan
        id: plan
        working-directory: infrastructure/terraform/environments/${{ matrix.environment }}
        run: |
          terraform plan -lock=false -no-color -out=tfplan
          terraform show -no-color tfplan > plan.txt

      - name: Comment PR with Plan
        uses: actions/github-script@v9
        with:
          script: |
            const fs = require('fs');
            const workspaceRoot = process.env.GITHUB_WORKSPACE;
            const envPath = '${{ matrix.environment }}';
            const planPath = `${workspaceRoot}/infrastructure/terraform/environments/${envPath}/plan.txt`;
            const plan = fs.readFileSync(planPath, 'utf8');
            const environment = '${{ matrix.environment }}';

            // Extract summary line from plan output
            const summaryMatch = plan.match(/^(No changes\..+|Plan: .+)$/m);
            const summary = summaryMatch ? summaryMatch[0] : 'Plan generated';

            const marker = `<!-- terraform-plan:${environment} -->`;
            const body = [
              marker,
              `## terraform-plan (${environment})`,
              '',
              `**${summary}**`,
              '',
              '<details>',
              '<summary>Show full plan output</summary>',
              '',
              '```',
              plan,
              '```',
              '</details>'
            ].join('\n');

            const comments = await github.rest.issues.listComments({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo
            });

            const existing = comments.data.find(comment => comment.body.includes(marker));

            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body
              });
              return;
            }

            await github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body
            });
