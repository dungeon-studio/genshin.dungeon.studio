# SPDX-License-Identifier: MIT

name: Terraform Plan

on:
  pull_request:
    branches: [develop, main, 'release/**']
    paths:
      - 'infrastructure/terraform/environments/**'
      - '.github/workflows/terraform-plan.yml'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  terraform-plan:
    name: ${{ matrix.environment }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
      pull-requests: write

    strategy:
      fail-fast: false
      matrix:
        include:
          - environment: core
          - environment: dev
          - environment: staging

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - uses: hashicorp/setup-terraform@dfe3c3f87815947d99a8997f908cb6525fc44e9e # v4
        with:
          terraform_version: '1.9.0'

      # Authenticate to GCP using Workload Identity.
      # Each environment maps to an explicit secret reference so this step
      # narrows which secret is passed to the action input and avoids dynamic
      # secret indexing (fixes CodeQL actions/excessive-secrets-exposure).
      - uses: google-github-actions/auth@7c6bc770dae815cd3e89ee6cdf493a5fab2cc093 # v3
        with:
          workload_identity_provider: ${{ secrets.GCP_RO_WORKLOAD_IDENTITY_PROVIDER }} # pragma: allowlist secret
          service_account: >-
            ${{
              matrix.environment == 'core' && secrets.GCP_RO_CORE_SERVICE_ACCOUNT_EMAIL ||
              matrix.environment == 'dev' && secrets.GCP_RO_DEV_SERVICE_ACCOUNT_EMAIL ||
              matrix.environment == 'staging' && secrets.GCP_RO_STAGING_SERVICE_ACCOUNT_EMAIL
            }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@aa5489c8933f4cc7a4f7d45035b3b1440c9c10db # v3

      - name: Terraform Init
        working-directory: infrastructure/terraform/environments/${{ matrix.environment }}
        run: terraform init

      # Terraform validate runs in CI (not pre-commit) because it requires
      # backend initialization and GCS bucket authentication via WIF.
      - name: Terraform Validate
        working-directory: infrastructure/terraform/environments/${{ matrix.environment }}
        run: terraform validate

      - name: Terraform Plan
        id: plan
        working-directory: infrastructure/terraform/environments/${{ matrix.environment }}
        run: |
          terraform plan -lock=false -no-color -out=tfplan
          terraform show -no-color tfplan > plan.txt

      - name: Comment PR with Plan
        uses: actions/github-script@373c709c69115d41ff229c7e5df9f8788daa9553 # v9
        with:
          script: |
            const fs = require('fs');
            const workspaceRoot = process.env.GITHUB_WORKSPACE;
            const envPath = '${{ matrix.environment }}';
            const planPath = `${workspaceRoot}/infrastructure/terraform/environments/${envPath}/plan.txt`;
            const plan = fs.readFileSync(planPath, 'utf8');
            const environment = '${{ matrix.environment }}';

            // Extract summary line from plan output
            const summaryMatch = plan.match(/^(No changes\..+|Plan: .+)$/m);
            const summary = summaryMatch ? summaryMatch[0] : 'Plan generated';

            const marker = `<!-- terraform-plan:${environment} -->`;
            const body = [
              marker,
              `## terraform-plan (${environment})`,
              '',
              `**${summary}**`,
              '',
              '<details>',
              '<summary>Show full plan output</summary>',
              '',
              '```',
              plan,
              '```',
              '</details>'
            ].join('\n');

            const comments = await github.rest.issues.listComments({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo
            });

            const existing = comments.data.find(comment => comment.body.includes(marker));

            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body
              });
              return;
            }

            await github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body
            });
