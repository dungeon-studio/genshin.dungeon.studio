---
name: Trivy

on:
  pull_request:
  push:
    branches:
      - develop
      - main

permissions:
  contents: read

jobs:
  terraform:
    name: Terraform
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
      security-events: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Scan Terraform
        uses: aquasecurity/trivy-action@a9c7b0f06e461e9d4b4d1711f154ee024b8d7ab8 # v0.36.0
        with:
          scan-type: config
          scan-ref: infrastructure/terraform
          format: sarif
          output: terraform-results.sarif
          trivy-config: .trivy.yaml

      - name: Upload Terraform SARIF
        uses: github/codeql-action/upload-sarif@dc73d59c2d7bd4f8194098a91219eeee6d8a1719 # v4
        if: always()
        with:
          sarif_file: terraform-results.sarif
          category: trivy-terraform

  dockerfile:
    name: Dockerfile
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
      security-events: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Scan Dockerfile
        uses: aquasecurity/trivy-action@a9c7b0f06e461e9d4b4d1711f154ee024b8d7ab8 # v0.36.0
        with:
          scan-type: config
          scan-ref: apps/api
          format: sarif
          output: dockerfile-results.sarif
          trivy-config: .trivy.yaml

      - name: Upload Dockerfile SARIF
        uses: github/codeql-action/upload-sarif@dc73d59c2d7bd4f8194098a91219eeee6d8a1719 # v4
        if: always()
        with:
          sarif_file: dockerfile-results.sarif
          category: trivy-dockerfile

  container:
    name: Container Image
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
      security-events: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5 # v4

      - name: Build image
        uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf # v7
        with:
          context: .
          file: ./apps/api/Dockerfile
          push: false
          load: true
          tags: api-trivy:scan
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Scan Container Image
        uses: aquasecurity/trivy-action@a9c7b0f06e461e9d4b4d1711f154ee024b8d7ab8 # v0.36.0
        with:
          image-ref: api-trivy:scan
          format: sarif
          output: container-results.sarif
          trivy-config: .trivy.yaml

      - name: Upload Container SARIF
        uses: github/codeql-action/upload-sarif@dc73d59c2d7bd4f8194098a91219eeee6d8a1719 # v4
        if: always()
        with:
          sarif_file: container-results.sarif
          category: trivy-container
