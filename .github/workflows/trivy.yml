---
name: Trivy

on:
  pull_request:
  push:
    branches:
      - develop
      - main

permissions:
  contents: read

jobs:
  terraform:
    name: Terraform
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
      security-events: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Scan Terraform
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: config
          scan-ref: infrastructure/terraform
          format: sarif
          output: terraform-results.sarif
          exit-code: '1'
          severity: HIGH,CRITICAL

      - name: Upload Terraform SARIF
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: terraform-results.sarif
          category: trivy-terraform

  dockerfile:
    name: Dockerfile
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
      security-events: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Scan Dockerfile
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: config
          scan-ref: apps/api
          format: sarif
          output: dockerfile-results.sarif
          exit-code: '1'
          severity: HIGH,CRITICAL

      - name: Upload Dockerfile SARIF
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: dockerfile-results.sarif
          category: trivy-dockerfile

  container:
    name: Container Image
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
      security-events: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build image
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ./apps/api/Dockerfile
          push: false
          load: true
          tags: api-trivy:scan
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Scan Container Image
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: api-trivy:scan
          format: sarif
          output: container-results.sarif
          exit-code: '1'
          severity: HIGH,CRITICAL

      - name: Upload Container SARIF
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: container-results.sarif
          category: trivy-container
