---
name: pre-commit

on:
  pull_request:
  push:
    branches:
      - develop
      - main

permissions:
  contents: read

jobs:
  pre-commit:
    name: Local Hooks
    runs-on: ubuntu-latest
    timeout-minutes: 10

    # NOTE: This workflow runs only the hooks skipped by pre-commit.ci.
    # See .pre-commit-config.yaml ci.skip for the complete list.

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - uses: ./.github/actions/setup-node-pnpm

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@v4
        with:
          terraform_version: '1.9.0'

      - name: Run ESLint hook
        uses: pre-commit/action@v3.0.1
        with:
          extra_args: --all-files eslint

      - name: Run Stylelint hook
        uses: pre-commit/action@v3.0.1
        with:
          extra_args: --all-files stylelint

      - name: Run Terraform fmt hook
        uses: pre-commit/action@v3.0.1
        with:
          extra_args: --all-files terraform_fmt

      - name: Install Trivy
        run: |
          set -euo pipefail
          TRIVY_INSTALL=https://raw.githubusercontent.com/aquasecurity/trivy
          curl -fsSL "$TRIVY_INSTALL/main/contrib/install.sh" \
            | sh -s -- -b /usr/local/bin

      - name: Run Terraform Trivy hook
        uses: pre-commit/action@v3.0.1
        with:
          extra_args: --all-files terraform_trivy
