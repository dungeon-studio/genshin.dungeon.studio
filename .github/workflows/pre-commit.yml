---
name: Local pre-commit hooks

on:
  pull_request:
  push:
    branches:
      - develop
      - main

jobs:
  pre-commit:
    name: Run local pre-commit hooks
    runs-on: ubuntu-latest
    timeout-minutes: 10

    # NOTE: This workflow runs only the hooks skipped by pre-commit.ci.
    # See .pre-commit-config.yaml ci.skip for the complete list.

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '24'

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          run_install: false

      - name: Get pnpm store directory
        shell: bash
        run: |
          echo "STORE_PATH=$(pnpm store path --silent)" >> $GITHUB_ENV

      - name: Setup pnpm cache
        uses: actions/cache@v5
        with:
          path: ${{ env.STORE_PATH }}
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-store-

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@v4
        with:
          terraform_version: '1.9.0'

      - name: Run ESLint hook
        uses: pre-commit/action@v3.0.1
        with:
          extra_args: --all-files eslint

      - name: Run Stylelint hook
        uses: pre-commit/action@v3.0.1
        with:
          extra_args: --all-files stylelint

      - name: Run Terraform fmt hook
        uses: pre-commit/action@v3.0.1
        with:
          extra_args: --all-files terraform_fmt
