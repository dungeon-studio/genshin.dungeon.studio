---
name: pre-commit

on:
  pull_request:
  push:
    branches:
      - develop
      - main

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/develop' && github.ref != 'refs/heads/main' }}

jobs:
  pre-commit:
    name: Local Hooks
    runs-on: ubuntu-latest
    timeout-minutes: 10

    # NOTE: This workflow runs only the hooks skipped by pre-commit.ci.
    # See .pre-commit-config.yaml ci.skip for the complete list.

    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - uses: ./.github/actions/setup-node-pnpm

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@dfe3c3f87815947d99a8997f908cb6525fc44e9e # v4
        with:
          terraform_version: '1.9.0'

      # Org allowlist requires literal pre-commit/action@v3.* — SHA pin
      # would be rejected. Applies to every pre-commit/action use below.
      - name: Run ESLint hook
        uses: pre-commit/action@v3.0.1
        with:
          extra_args: --all-files eslint

      - name: Run Prettier hook
        uses: pre-commit/action@v3.0.1
        with:
          extra_args: --all-files prettier

      - name: Run Stylelint hook
        uses: pre-commit/action@v3.0.1
        with:
          extra_args: --all-files stylelint

      - name: Run Terraform fmt hook
        uses: pre-commit/action@v3.0.1
        with:
          extra_args: --all-files terraform_fmt

      - name: Install Trivy
        run: |
          set -euo pipefail
          TRIVY_INSTALL=https://raw.githubusercontent.com/aquasecurity/trivy
          curl -fsSL "$TRIVY_INSTALL/main/contrib/install.sh" \
            | sh -s -- -b /usr/local/bin

      - name: Run Terraform Trivy hook
        uses: pre-commit/action@v3.0.1
        env:
          TRIVY_CONFIG: ${{ github.workspace }}/.trivy.yaml
        with:
          extra_args: --all-files terraform_trivy

      - name: Run Renovate config validator hook
        uses: pre-commit/action@v3.0.1
        with:
          extra_args: --all-files renovate-config-validator

      - name: Install hadolint
        run: |
          set -euo pipefail
          HADOLINT_VERSION=v2.12.0
          sudo curl -fsSL \
            "https://github.com/hadolint/hadolint/releases/download/${HADOLINT_VERSION}/hadolint-Linux-x86_64" \
            -o /usr/local/bin/hadolint
          sudo chmod +x /usr/local/bin/hadolint

      - name: Run hadolint hook
        uses: pre-commit/action@v3.0.1
        with:
          extra_args: --all-files hadolint
