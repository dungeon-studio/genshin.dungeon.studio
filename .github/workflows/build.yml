---
name: Build

on:
  pull_request:
  push:
    branches:
      - develop
      - main

jobs:
  build:
    name: Typecheck and build
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - uses: ./.github/actions/setup-node-pnpm

      - name: Typecheck
        run: pnpm typecheck

      - name: Build
        run: pnpm build

      - name: Verify Build Artifacts
        run: |
          test -d apps/web/dist || { echo "web dist directory not found"; exit 1; }
          test -f apps/web/dist/index.html || { echo "index.html not found"; exit 1; }
          test -d apps/web/dist/assets || { echo "assets directory not found"; exit 1; }
          echo "✓ Build artifacts verified"

      # Tests will be added once a test suite is available.
      # - name: Test
      #   run: pnpm test

# ---------------------------------------------------------------------------
# Maintenance notes
# - Update this workflow when new languages or runtimes are added.
# - If build steps change (e.g., new apps/packages), update the pnpm commands.
# - Keep caching strategy aligned with package manager changes.
# ---------------------------------------------------------------------------
